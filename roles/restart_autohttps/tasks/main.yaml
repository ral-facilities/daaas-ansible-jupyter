- name: get pods
  k8s_info:
    kind: pod
    namespace: jupyterhub
    field_selectors:
      - spec.serviceAccountName=autohttps
    kubeconfig: "{{ kubeconfig_path }}"
  register: pods
  delegate_to: kubernetes

- name: debug
  debug:
    msg: "{{ pods }}"

- name: get pod name
  set_fact:
    pod_name: "{{ pods.resources | map(attribute='metadata.name') | list | first }}"
  delegate_to: kubernetes

- name: delete/restart autohttps pod
  k8s:
    api_version: v1
    kind: pod
    namespace: jupyterhub
    name: "{{ pod_name }}"
    state: absent
    wait: true
    kubeconfig: "{{ kubeconfig_path }}"
  delegate_to: kubernetes
