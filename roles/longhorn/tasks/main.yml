- name: Get free floating IP
  shell: openstack floating ip list -c "Floating IP Address" -c "Port" -f json --os-cloud openstack | jq -r '.[] | select(.Port==null) | ."Floating IP Address"' | head -n 1
  register: fip_tmp

- name: Set fact for floating IP
  ansible.builtin.set_fact:
    longhorn_ip: "{{ fip_tmp.stdout }}"

- name: Create Longhorn namespace
  kubernetes.core.k8s:
    name: longhorn-system
    kind: Namespace
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
  delegate_to: kubernetes

- name: Download Longhorn repos
  ansible.builtin.git:
    repo: "{{ longhorn_repo_name }}"
    dest: "/tmp/longhorn"
    version: "{{ longhorn_version }}"
    update: true # Automatically pull bug-fixes in
  delegate_to: kubernetes

- name: Install Longhorn prerequisites
  kubernetes.core.k8s:
    state: present
    src: "{{ item }}"
    namespace: longhorn-system
    kubeconfig: "{{ kubeconfig_path }}"
  with_items:
    - "/tmp/longhorn/deploy/prerequisite/longhorn-iscsi-installation.yaml"
    - "/tmp/longhorn/deploy/prerequisite/longhorn-nfs-installation.yaml"
  delegate_to: kubernetes

- name: git clone repo
  ansible.builtin.shell: git clone https://github.com/stfc/ansible-jupyter.git -b DAaaS-semaphore --force
  ignore_errors: true
  delegate_to: kubernetes

- name: Install Longhorn helm repo
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
  delegate_to: kubernetes

- name: Install Longhorn
  kubernetes.core.helm:
    chart_ref: longhorn/longhorn
    name: longhorn
    release_namespace: longhorn-system
    kubeconfig: "{{ kubeconfig_path }}"
    values_files:
      - "{{ longhorn_config_file }}"
    update_repo_cache: yes
    release_values:
      taintToleration: "nvidia.com/gpu:NoSchedule"
      service:
        ui:
          type: LoadBalancer
          loadBalancerIP: "{{ longhorn_ip }}"
      persistence:
        defaultClassReplicaCount: 3
        defaultDataLocality: disabled
  delegate_to: kubernetes

