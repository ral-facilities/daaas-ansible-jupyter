---
- name: Check user password meets requirements
  ansible.builtin.fail:
    msg: "User password must be at least 32 characters"
  when: user_password | length < 32

- name: Check admin password meets requirements
  ansible.builtin.fail:
    msg: "Admin password must be at least 32 characters"
  when: admin_password | length < 32

- name: Install pre-set version of hub. This may take up to 25m to pull various images...
  kubernetes.core.helm:
    chart_ref: "{{ jhub_chart_ref }}"
    chart_repo_url: "{{ jhub_repo_url }}"
    release_name: "{{ jhub_deployed_name }}"
    chart_version: "{{ jhub_version }}"
    release_namespace: "{{ jhub_namespace }}"
    create_namespace: true
    kubeconfig: "{{ kubeconfig_path }}"
    wait: true
    release_values: "{{ jupyterhub_config_values }}"
    timeout: "25m"
