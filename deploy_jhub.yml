- hosts: localhost # Kubectl is configured from this machine
  gather_facts: true
  environment:
    PATH: "{{ ansible_env.PATH }}"
  vars_files:
    - group_vars/all.yaml
    - "group_vars/{{ env }}.yaml"
  roles:
    - check_cluster
    - install_kubernetes
    - longhorn
    - deploy_jupyterhub
    - restart_autohttps


